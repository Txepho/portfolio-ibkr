<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mi Cartera</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#070b12;--s1:#0e1520;--s2:#131d2e;--border:#1a2640;--a1:#3b82f6;--a2:#8b5cf6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--text:#e2e8f0;--muted:#64748b;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 0%,#0d1f3c 0%,var(--bg) 70%);}
.login-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:380px;box-shadow:0 40px 80px rgba(0,0,0,.6);animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.login-logo{width:56px;height:56px;border-radius:14px;margin:0 auto 24px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:26px;}
.login-card h1{text-align:center;font-size:22px;font-weight:700;margin-bottom:6px;}
.login-card p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:32px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:var(--mono);}
.field input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;font-family:var(--sans);outline:none;transition:.2s;}
.field input:focus{border-color:var(--a1);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
.btn-login{width:100%;margin-top:8px;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;font-size:14px;font-weight:700;font-family:var(--sans);cursor:pointer;transition:.2s;}
.btn-login:hover{opacity:.9;transform:translateY(-1px);}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px;}
#app{display:none;}
.header{background:var(--s1);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-logo{width:34px;height:34px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:16px;}
.header h1{font-size:16px;font-weight:700;font-family:var(--mono);}
.header h1 span{color:var(--a1);}
.header-sub{font-size:10px;color:var(--muted);}
.header-right{display:flex;align-items:center;gap:8px;}
.btn-sm{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--mono);transition:.2s;white-space:nowrap;}
.btn-sm:hover{border-color:var(--a1);color:var(--a1);}
.btn-sm:disabled{opacity:.5;cursor:wait;}
.btn-out{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--mono);transition:.2s;}
.btn-out:hover{border-color:var(--red);color:var(--red);}
.tabs{background:var(--s1);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 12px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;background:none;border:none;color:var(--muted);border-bottom:2px solid transparent;font-family:var(--mono);white-space:nowrap;transition:.2s;}
.tab.active{color:var(--a1);border-bottom-color:var(--a1);}
.content{padding:16px;max-width:1200px;margin:0 auto;}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;gap:16px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--a1);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;font-family:var(--mono);}
.stat-value{font-size:20px;font-weight:700;font-family:var(--mono);}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.pos-list{display:flex;flex-direction:column;gap:8px;}
.pos-row{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;transition:.2s;flex-wrap:wrap;}
.pos-row:hover{border-color:var(--a1);background:var(--s2);}
.pos-logo{width:30px;height:30px;border-radius:7px;object-fit:contain;background:#fff;padding:2px;flex-shrink:0;}
.pos-fb{width:30px;height:30px;border-radius:7px;flex-shrink:0;background:linear-gradient(135deg,var(--a2),var(--a1));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:var(--mono);}
.pos-name{flex:1;min-width:80px;}
.pos-ticker{font-size:13px;font-weight:700;font-family:var(--mono);}
.pos-sector{font-size:10px;color:var(--muted);}
.pos-meta{display:flex;gap:14px;flex-wrap:wrap;}
.pf{text-align:right;}
.pf-l{font-size:9px;color:var(--muted);text-transform:uppercase;font-family:var(--mono);}
.pf-v{font-size:12px;font-weight:600;font-family:var(--mono);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:640px){.two-col{grid-template-columns:1fr;}}
.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.card-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;font-family:var(--mono);}
.heatmap{display:flex;flex-wrap:wrap;gap:8px;}
.hc{border-radius:10px;padding:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:transform .2s;border:1px solid transparent;cursor:default;}
.hc:hover{transform:scale(1.07);}
.pb{background:var(--border);border-radius:4px;height:5px;overflow:hidden;flex:1;}
.pf2{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--a1),var(--a2));}
.div-row{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.badge{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;font-family:var(--mono);text-transform:uppercase;}
.error-box{padding:12px;background:rgba(239,68,68,.15);border:1px solid var(--red);border-radius:8px;font-size:12px;color:var(--red);margin-bottom:16px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">📊</div>
    <h1>Mi Cartera</h1>
    <p>Acceso privado</p>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="pwd" placeholder="••••••••"/>
    </div>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="lerr"></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">📊</div>
      <div>
        <h1>Mi <span>Cartera</span></h1>
        <div class="header-sub" id="upd">—</div>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-sm" id="btnr" onclick="loadData()">⟳ Actualizar</button>
      <button class="btn-out" onclick="doLogout()">✕</button>
    </div>
  </div>
  <div class="tabs" id="tabsbar"></div>
  <div class="content" id="mc">
    <div class="loading-state"><div class="spinner"></div><p style="color:var(--muted);font-size:13px">Cargando cartera…</p></div>
  </div>
</div>

<script>
const PWD="Ibkr#J0s3$2026!";

// Logo domains for visual identification
const LM={ABBV:"abbvie.com",AMZN:"amazon.com",ASTS:"ast-science.com",BAM:"brookfield.com",BITO:"proshares.com",BKNG:"booking.com",BN:"brookfield.com",ENB:"enbridge.com",JEPI:"jpmorgan.com",JEPQ:"jpmorgan.com",MA:"mastercard.com",MAIN:"mainstcapital.com",MCD:"mcdonalds.com",MSFT:"microsoft.com",NEE:"nexteraenergy.com",ONDS:"ondas.com",PAYX:"paychex.com",SPGI:"spglobal.com",UNH:"unitedhealthgroup.com",V:"visa.com",VICI:"viciproperties.com",ZTS:"zoetis.com","700":"tencent.com",ABBV:"abbvie.com",ASML:"asml.com",IBE:"iberdrola.com",BATS:"bat.com",WKL:"wolterskluwer.com",RMS:"hermes.com"};

// Estimated annual dividend per share (used for YOC calc) - update as needed
const DIV={ABBV:6.56,ENB:3.77,JEPI:6.80,JEPQ:6.20,MAIN:3.00,MCD:7.08,NEE:2.31,PAYX:3.92,VICI:1.72,BN:0.28,BAM:1.50,V:0.90,MA:2.64,MSFT:3.32,UNH:8.40,ZTS:1.60,SPGI:4.32,"700":3.40,ASML:6.40,IBE:0.62,BATS:2.40,WKL:1.65};

const CL=["#3b82f6","#8b5cf6","#10b981","#f59e0b","#ef4444","#06b6d4","#a78bfa","#34d399","#fbbf24","#f87171","#0ea5e9","#c4b5fd","#4ade80","#facc15","#fb923c"];

let st={positions:null,tab:"overview",fetchedAt:null};

function doLogin(){
  const p=document.getElementById("pwd").value;
  const e=document.getElementById("lerr");
  if(p!==PWD){e.textContent="Contraseña incorrecta.";return;}
  sessionStorage.setItem("auth","1");
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="block";
  renderTabs();loadData();
}
function doLogout(){sessionStorage.clear();location.reload();}
document.getElementById("pwd").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
if(sessionStorage.getItem("auth")==="1"){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="block";
  renderTabs();
}

async function loadData(){
  const btn=document.getElementById("btnr");
  btn.disabled=true;btn.textContent="⏳ Cargando…";
  document.getElementById("mc").innerHTML=`<div class="loading-state"><div class="spinner"></div><p style="color:var(--muted);font-size:13px">Consultando IBKR (puede tardar 10-20s)…</p></div>`;
  try{
    const r=await fetch("/.netlify/functions/portfolio");
    const data=await r.json();
    if(data.error){
      document.getElementById("mc").innerHTML=`<div class="error-box">⚠️ ${data.error}</div>`;
      btn.disabled=false;btn.textContent="⟳ Actualizar";
      return;
    }
    st.positions=data.positions;
    st.fetchedAt=data.fetchedAt;
    document.getElementById("upd").textContent="Actualizado: "+new Date(data.fetchedAt).toLocaleString("es-ES");
  }catch(e){
    document.getElementById("mc").innerHTML=`<div class="error-box">⚠️ Error: ${e.message}</div>`;
  }
  btn.disabled=false;btn.textContent="⟳ Actualizar";
  renderMain(st.tab);
}

const fmt=(n,d=0)=>n==null||isNaN(n)?"—":Number(n).toLocaleString("es-ES",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtD=(n)=>n==null||isNaN(n)?"—":`${n>=0?"+":""}${Number(n).toFixed(2)}%`;
const fmtC=(n,cur="$")=>n==null||isNaN(n)?"—":`${cur}${fmt(n,0)}`;
const clr=(n)=>n>=0?"var(--green)":"var(--red)";
const cv=(n,cur="$")=>`<span style="color:${clr(n)}">${fmtC(n,cur)}</span>`;
const sc=(l,v,s,c)=>`<div class="stat-card"><div class="stat-label">${l}</div><div class="stat-value" style="color:${c}">${v}</div>${s?`<div class="stat-sub">${s}</div>`:""}</div>`;
function lg(t,sz=30){const d=LM[t];if(!d)return `<div class="pos-fb" style="width:${sz}px;height:${sz}px;font-size:${sz*.35}px">${t.slice(0,2)}</div>`;return `<img class="pos-logo" src="https://logo.clearbit.com/${d}" width="${sz}" height="${sz}" onerror="this.outerHTML='<div class=\\'pos-fb\\' style=\\'width:${sz}px;height:${sz}px;font-size:${sz*.35}px\\'>${t.slice(0,2)}</div>'" style="width:${sz}px;height:${sz}px"/>`;}

// Currency conversion to USD (approx rates, updated periodically)
const FX_TO_USD={USD:1,EUR:1.08,HKD:0.128,GBP:1.27};

function enrich(positions){
  // Filter stock-like positions (skip cash/forex)
  const stocks=(positions||[]).filter(p=>p.assetClass==="STK"||p.assetClass==="FUND");
  const tot=stocks.reduce((a,p)=>{
    const fx=FX_TO_USD[p.currency]||parseFloat(p.fxRateToBase)||1;
    return a+(parseFloat(p.positionValue)||0)*fx;
  },0);
  return stocks.map(p=>{
    const fx=FX_TO_USD[p.currency]||parseFloat(p.fxRateToBase)||1;
    const qty=parseFloat(p.position)||0;
    const markPrice=parseFloat(p.markPrice)||0;
    const posVal=(parseFloat(p.positionValue)||0)*fx;
    const costBasisMoney=(parseFloat(p.costBasisMoney)||0)*fx;
    const costBasisPrice=parseFloat(p.costBasisPrice)||0;
    const unrealPnl=(parseFloat(p.unrealizedPnL)||0)*fx;
    const pct=costBasisMoney!==0?((posVal-costBasisMoney)/Math.abs(costBasisMoney))*100:0;
    const w=tot>0?(posVal/tot)*100:0;
    const annDivPerShare=DIV[p.symbol]||0;
    const annDiv=annDivPerShare*qty*fx;
    const yoc=costBasisPrice>0?(annDivPerShare/costBasisPrice)*100:0;
    const curYield=markPrice>0?(annDivPerShare/markPrice)*100:0;
    // Holding period in years for simple annualized return
    let years=null,tir=null;
    if(p.openDateTime){
      const opened=new Date(p.openDateTime.replace(";"," ").slice(0,8).replace(/(\d{4})(\d{2})(\d{2})/,"$1-$2-$3"));
      const now=new Date();
      years=(now-opened)/(365.25*24*3600*1000);
      if(years>0.05 && costBasisMoney!==0){
        tir=(Math.pow(posVal/Math.abs(costBasisMoney),1/years)-1)*100;
      }
    }
    return{
      ...p,ticker:p.symbol,usd:posVal,pct,w,
      qty,markPrice,costBasisPrice,costBasisMoney,unrealPnl,
      annDiv,yoc,curYield,years,tir
    };
  }).sort((a,b)=>b.usd-a.usd);
}

const TABS=[{id:"overview",l:"Resumen"},{id:"posiciones",l:"Posiciones"},{id:"heatmap",l:"Heatmap"},{id:"dividendos",l:"Dividendos"},{id:"rentabilidad",l:"Rentabilidad"}];
function renderTabs(){document.getElementById("tabsbar").innerHTML=TABS.map(t=>`<button class="tab${st.tab===t.id?" active":""}" onclick="sw('${t.id}')">${t.l}</button>`).join("");}
function sw(id){st.tab=id;renderTabs();renderMain(id);}

function renderMain(tab){
  const el=document.getElementById("mc");
  if(!st.positions){el.innerHTML=`<div class="loading-state"><div class="spinner"></div><p style="color:var(--muted);font-size:13px">Cargando…</p></div>`;return;}
  const en=enrich(st.positions);
  if(en.length===0){
    el.innerHTML=`<div class="error-box">No se encontraron posiciones de tipo acción/fondo en el informe. Comprueba que "Open Positions" está habilitado en la Flex Query.</div>`;
    return;
  }
  const tot=en.reduce((s,p)=>s+p.usd,0);
  const pnl=en.reduce((s,p)=>s+p.unrealPnl,0);
  const tad=en.reduce((s,p)=>s+p.annDiv,0);
  const avgYield=tot>0?(tad/tot)*100:0;

  if(tab==="overview"){
    el.innerHTML=`
    <div class="stats-grid">
      ${sc("Valor Total",fmtC(tot),"Equiv. USD","var(--a1)")}
      ${sc("P&L Latente",cv(pnl),"No realizado",clr(pnl))}
      ${sc("Dividendo Anual",fmtC(tad),"Estimado","#a78bfa")}
      ${sc("Ingreso Mensual",fmtC(tad/12),"Promedio","var(--green)")}
      ${sc("Yield Medio",fmt(avgYield,2)+"%","Sobre valor actual","var(--amber)")}
      ${sc("Posiciones",en.length,"","var(--a1)")}
    </div>
    <div class="card">
      <div class="card-title">Top posiciones por peso</div>
      ${en.slice(0,10).map(p=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">${lg(p.ticker,22)}<span style="font-size:11px;font-weight:700;font-family:var(--mono);width:50px">${p.ticker}</span><div class="pb"><div class="pf2" style="width:${p.w}%"></div></div><span style="font-size:11px;color:var(--muted);font-family:var(--mono);width:40px;text-align:right">${fmt(p.w,1)}%</span><span style="font-size:11px;color:${clr(p.pct)};font-family:var(--mono);width:60px;text-align:right">${fmtD(p.pct)}</span></div>`).join("")}
    </div>`;
  }
  else if(tab==="posiciones"){
    el.innerHTML=`<div class="pos-list">${en.map(p=>`<div class="pos-row">${lg(p.ticker,30)}<div class="pos-name"><div class="pos-ticker">${p.ticker}</div><div class="pos-sector">${p.currency} · ${p.assetClass}</div></div><div class="pos-meta"><div class="pf"><div class="pf-l">Cantidad</div><div class="pf-v">${fmt(p.qty,p.qty%1!==0?2:0)}</div></div><div class="pf"><div class="pf-l">Precio</div><div class="pf-v">${fmt(p.markPrice,2)}</div></div><div class="pf"><div class="pf-l">Coste</div><div class="pf-v">${fmt(p.costBasisPrice,2)}</div></div><div class="pf"><div class="pf-l">Valor</div><div class="pf-v">${fmtC(p.usd)}</div></div><div class="pf"><div class="pf-l">P&L</div><div class="pf-v" style="color:${clr(p.unrealPnl)}">${fmtC(p.unrealPnl)}</div></div><div class="pf"><div class="pf-l">%</div><div class="pf-v" style="color:${clr(p.pct)}">${fmtD(p.pct)}</div></div><div class="pf"><div class="pf-l">Peso</div><div class="pf-v" style="color:var(--a1)">${fmt(p.w,1)}%</div></div></div></div>`).join("")}</div>`;
  }
  else if(tab==="heatmap"){
    el.innerHTML=`<p style="font-size:12px;color:var(--muted);margin-bottom:14px">Tamaño = peso en cartera · Color = rentabilidad</p><div class="heatmap">${en.map(p=>{const it=Math.min(Math.abs(p.pct)/15,1);const bg=p.pct>=0?`rgba(16,185,129,${0.15+it*0.55})`:`rgba(239,68,68,${0.15+it*0.55})`;const bo=p.pct>=0?"rgba(16,185,129,.4)":"rgba(239,68,68,.4)";const sz=Math.max(64,Math.min(140,p.w*9));return `<div class="hc" style="background:${bg};border-color:${bo};width:${sz}px;height:${sz}px">${lg(p.ticker,Math.max(16,sz*.28))}<div style="font-size:10px;font-weight:700;font-family:var(--mono)">${p.ticker}</div><div style="font-size:9px;font-weight:600;font-family:var(--mono);color:${clr(p.pct)}">${fmtD(p.pct)}</div><div style="font-size:8px;color:rgba(255,255,255,.5);font-family:var(--mono)">${fmt(p.w,1)}%</div></div>`;}).join("")}</div>`;
  }
  else if(tab==="dividendos"){
    const dvs=en.filter(p=>p.annDiv>0).sort((a,b)=>b.annDiv-a.annDiv);
    if(dvs.length===0){
      el.innerHTML=`<div class="card"><div class="card-title">Sin datos de dividendos</div><p style="font-size:12px;color:var(--muted)">No hay dividendos estimados para tus posiciones actuales en la base de datos local. Puedes ampliarla editando la constante DIV en el código.</p></div>`;
      return;
    }
    el.innerHTML=`
    <div class="stats-grid" style="margin-bottom:16px">
      ${sc("Dividendo Anual",fmtC(tad),"Total estimado","#a78bfa")}
      ${sc("Ingreso Mensual",fmtC(tad/12),"Promedio","var(--green)")}
      ${sc("Con Dividendo",dvs.length+" valores","","var(--a1)")}
    </div>
    <div class="card">
      <div class="card-title">Dividendo anual por posición</div>
      ${dvs.map(p=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">${lg(p.ticker,22)}<span style="font-size:12px;font-weight:700;font-family:var(--mono);width:50px">${p.ticker}</span><div class="pb"><div class="pf2" style="width:${(p.annDiv/dvs[0].annDiv)*100}%"></div></div><span style="font-size:12px;color:#a78bfa;font-family:var(--mono);width:60px;text-align:right">${fmtC(p.annDiv)}</span></div>`).join("")}
    </div>
    ${dvs.map(p=>`<div class="div-row">${lg(p.ticker,26)}<div style="flex:1"><div style="font-size:13px;font-weight:700;font-family:var(--mono)">${p.ticker}</div><div style="font-size:10px;color:var(--muted)">${fmt(p.qty,p.qty%1!==0?2:0)} acciones</div></div><div style="text-align:right"><div style="font-size:12px;font-weight:700;font-family:var(--mono);color:#a78bfa">${fmtC(p.annDiv)}/año</div><div style="font-size:10px;color:var(--green)">Yield actual: ${fmt(p.curYield,2)}%</div><div style="font-size:10px;color:var(--amber)">YOC: ${fmt(p.yoc,2)}%</div></div></div>`).join("")}`;
  }
  else if(tab==="rentabilidad"){
    const withTir=en.filter(p=>p.tir!=null).sort((a,b)=>b.tir-a.tir);
    el.innerHTML=`
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px">TIR = rentabilidad anualizada simple desde apertura de posición (no incluye dividendos cobrados ni aportaciones parciales)</p>
    ${withTir.map(p=>`<div class="div-row">${lg(p.ticker,26)}<div style="flex:1"><div style="font-size:13px;font-weight:700;font-family:var(--mono)">${p.ticker}</div><div style="font-size:10px;color:var(--muted)">${p.years?fmt(p.years,1)+" años en cartera":""}</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:700;font-family:var(--mono);color:${clr(p.tir)}">${fmtD(p.tir)}</div><div style="font-size:10px;color:var(--muted)">anualizado</div></div></div>`).join("")}
    ${en.filter(p=>p.tir==null).length>0?`<p style="font-size:11px;color:var(--muted);margin-top:10px">Sin fecha de apertura disponible para ${en.filter(p=>p.tir==null).length} posición(es).</p>`:""}`;
  }
}
</script>
</body>
</html>
