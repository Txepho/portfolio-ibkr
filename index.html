<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mi Cartera</title>

<!-- PWA / Icon support -->
<link rel="icon" href="/icon.svg" type="image/svg+xml"/>
<link rel="apple-touch-icon" href="/icon.svg"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#0e1520"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Mi Cartera"/>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#070b12;--s1:#0e1520;--s2:#131d2e;--border:#1a2640;
  --a1:#3b82f6;--a2:#8b5cf6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --text:#e2e8f0;--muted:#64748b;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
[data-theme="light"]{
  --bg:#f1f5f9;--s1:#ffffff;--s2:#f8fafc;--border:#e2e8f0;
  --a1:#2563eb;--a2:#7c3aed;--green:#059669;--red:#dc2626;--amber:#d97706;
  --text:#0f172a;--muted:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;transition:background .2s,color .2s;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 0%,#0d1f3c 0%,var(--bg) 70%);}
[data-theme="light"] #login-screen{background:radial-gradient(ellipse 80% 60% at 50% 0%,#dbeafe 0%,var(--bg) 70%);}
.login-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:380px;box-shadow:0 40px 80px rgba(0,0,0,.3);animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.login-logo{width:56px;height:56px;border-radius:14px;margin:0 auto 24px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:26px;}
.login-card h1{text-align:center;font-size:22px;font-weight:700;margin-bottom:6px;}
.login-card p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:32px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:var(--mono);}
.field input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;font-family:var(--sans);outline:none;transition:.2s;}
.field input:focus{border-color:var(--a1);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
.btn-login{width:100%;margin-top:8px;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;font-size:14px;font-weight:700;font-family:var(--sans);cursor:pointer;transition:.2s;}
.btn-login:hover{opacity:.9;transform:translateY(-1px);}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px;}
#app{display:none;}
.header{background:var(--s1);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-logo{width:34px;height:34px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:16px;}
.header h1{font-size:16px;font-weight:700;font-family:var(--mono);}
.header h1 span{color:var(--a1);}
.header-sub{font-size:10px;color:var(--muted);}
.header-right{display:flex;align-items:center;gap:8px;}
.btn-sm{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--mono);transition:.2s;white-space:nowrap;}
.btn-sm:hover{border-color:var(--a1);color:var(--a1);}
.btn-sm:disabled{opacity:.5;cursor:wait;}
.btn-icon{background:var(--s2);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:.2s;}
.btn-icon:hover{border-color:var(--a1);}
.btn-out{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--mono);transition:.2s;}
.btn-out:hover{border-color:var(--red);color:var(--red);}
.tabs{background:var(--s1);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 12px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;background:none;border:none;color:var(--muted);border-bottom:2px solid transparent;font-family:var(--mono);white-space:nowrap;transition:.2s;}
.tab.active{color:var(--a1);border-bottom-color:var(--a1);}
.content{padding:16px;max-width:1300px;margin:0 auto;}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;gap:16px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--a1);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px;}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;font-family:var(--mono);}
.stat-value{font-size:19px;font-weight:700;font-family:var(--mono);}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.pos-list{display:flex;flex-direction:column;gap:8px;}
.pos-row{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;transition:.2s;flex-wrap:wrap;}
.pos-row:hover{border-color:var(--a1);background:var(--s2);}
.pos-logo{width:30px;height:30px;border-radius:7px;object-fit:contain;background:#fff;padding:2px;flex-shrink:0;}
.pos-fb{width:30px;height:30px;border-radius:7px;flex-shrink:0;background:linear-gradient(135deg,var(--a2),var(--a1));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:var(--mono);}
.pos-name{flex:1;min-width:80px;}
.pos-ticker{font-size:13px;font-weight:700;font-family:var(--mono);}
.pos-sector{font-size:10px;color:var(--muted);}
.pos-meta{display:flex;gap:14px;flex-wrap:wrap;}
.pf{text-align:right;}
.pf-l{font-size:9px;color:var(--muted);text-transform:uppercase;font-family:var(--mono);}
.pf-v{font-size:12px;font-weight:600;font-family:var(--mono);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:640px){.two-col{grid-template-columns:1fr;}}
.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.card-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;font-family:var(--mono);}
.heatmap{display:flex;flex-wrap:wrap;gap:14px;}
.hc{border-radius:14px;padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:transform .2s;border:1px solid transparent;cursor:default;}
.hc:hover{transform:scale(1.05);}
.pb{background:var(--border);border-radius:4px;height:5px;overflow:hidden;flex:1;}
.pf2{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--a1),var(--a2));}
.div-row{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.badge{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;font-family:var(--mono);text-transform:uppercase;}
.error-box{padding:12px;background:rgba(239,68,68,.15);border:1px solid var(--red);border-radius:8px;font-size:12px;color:var(--red);margin-bottom:16px;}
.warn-box{padding:10px 12px;background:rgba(245,158,11,.12);border:1px solid var(--amber);border-radius:8px;font-size:11px;color:var(--amber);margin-bottom:14px;}
.rank-row{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.rank-label{font-size:12px;color:var(--muted);}
.rank-value{font-size:13px;font-weight:700;font-family:var(--mono);}
.chart-wrap{position:relative;height:300px;}
.chart-wrap.tall{height:400px;}
.cfg-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cfg-row input{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:var(--mono);font-size:12px;width:120px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">📊</div>
    <h1>Mi Cartera</h1>
    <p>Acceso privado</p>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="pwd" placeholder="••••••••"/>
    </div>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="lerr"></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">📊</div>
      <div>
        <h1>Mi <span>Cartera</span></h1>
        <div class="header-sub" id="upd">—</div>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-sm" id="currBtn" onclick="toggleCurrency()" title="Cambiar divisa" style="font-family:var(--mono);font-size:11px;font-weight:700;min-width:48px">USD</button>
      <button class="btn-icon" id="privacyBtn" onclick="togglePrivacy()" title="Ocultar importes">👁️</button>
      <button class="btn-icon" id="themeBtn" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
      <button class="btn-sm" id="btnr" onclick="loadData(false)">⟳ Actualizar</button>
      <button class="btn-icon" onclick="loadData(true)" title="Forzar nueva consulta a IBKR (consume cuota)">⚡</button>
      <button class="btn-out" onclick="doLogout()">✕</button>
    </div>
  </div>
  <div class="tabs" id="tabsbar"></div>
  <div class="content" id="mc">
    <div class="loading-state"><div class="spinner"></div><p style="color:var(--muted);font-size:13px">Cargando cartera…</p></div>
  </div>
</div>

<script>
const PWD="Ibkr#J0s3$2026!";

const LM={ABBV:"abbvie.com",AMZN:"amazon.com",ASTS:"ast-science.com",BAM:"brookfield.com",BITO:"proshares.com",BKNG:"booking.com",BN:"brookfield.com",ENB:"enbridge.com",JEPI:"jpmorgan.com",JEPQ:"jpmorgan.com",MA:"mastercard.com",MAIN:"mainstcapital.com",MCD:"mcdonalds.com",MSFT:"microsoft.com",NEE:"nexteraenergy.com",ONDS:"ondas.com",PAYX:"paychex.com",SPGI:"spglobal.com",UNH:"unitedhealthgroup.com",V:"visa.com",VICI:"viciproperties.com",ZTS:"zoetis.com","700":"tencent.com",ASML:"asml.com",IBE:"iberdrola.com",BATS:"bat.com",WKL:"wolterskluwer.com",RMS:"hermes.com",BIP:"brookfield.com"};

// Fallback estimated annual dividend (used only if no real dividend history found)
const DIV_FALLBACK={ABBV:6.56,ENB:3.77,JEPI:6.80,JEPQ:6.20,MAIN:3.00,MCD:7.08,NEE:2.31,PAYX:3.92,VICI:1.72,BN:0.28,BAM:1.50,V:0.90,MA:2.64,MSFT:3.32,UNH:8.40,ZTS:1.60,SPGI:4.32,"700":3.40,ASML:6.40,IBE:0.62,BATS:2.40,WKL:1.65};

const CL=["#3b82f6","#8b5cf6","#10b981","#f59e0b","#ef4444","#06b6d4","#a78bfa","#34d399","#fbbf24","#f87171","#0ea5e9","#c4b5fd","#4ade80","#facc15","#fb923c"];

const SECTOR_MAP={
  ABBV:"Salud",AMZN:"Tecnología",ASTS:"Telecom",BAM:"Financiero",
  BITO:"Cripto ETF",BKNG:"Consumo Discrecional",BN:"Financiero",
  ENB:"Energía",JEPI:"ETF Ingresos",JEPQ:"ETF Ingresos",MA:"Financiero",
  MAIN:"BDC",MCD:"Consumo Estable",MSFT:"Tecnología",NEE:"Utilities",
  ONDS:"Tecnología",PAYX:"Servicios Empresariales",SPGI:"Datos Financieros",
  UNH:"Salud",V:"Financiero",VICI:"REIT",ZTS:"Salud Animal",
  "700":"Tecnología HK",ASML:"Tecnología",IBE:"Utilities",
  BATS:"Consumo Estable",WKL:"Datos Empresariales",RMS:"Lujo",BIP:"Infraestructura"
};
const CCY_NAMES={USD:"Dólar EE.UU.",EUR:"Euro",HKD:"Dólar Hong Kong",GBP:"Libra esterlina"};
const CCY_FLAG={USD:"🇺🇸",EUR:"🇪🇺",HKD:"🇭🇰",GBP:"🇬🇧"};
const MESES=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

let st={positions:null,dividends:[],optionPositions:[],optionsError:null,navHistory:[],tab:"overview",fetchedAt:null};
let charts={};
let divTarget=parseFloat(localStorage.getItem("divTarget"))||500;

// ── THEME ──
function applyTheme(t){
  document.documentElement.setAttribute("data-theme",t);
  document.getElementById("themeBtn").textContent=t==="light"?"☀️":"🌙";
  localStorage.setItem("theme",t);
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute("data-theme")==="light"?"dark":"light";
  applyTheme(cur);
  Object.values(charts).forEach(c=>c&&c.destroy());
  charts={};
  renderMain(st.tab);
}
applyTheme(localStorage.getItem("theme")||"dark");

// ── PRIVACY MODE (hide amounts for screenshots) ──
let privacyMode=localStorage.getItem("privacyMode")==="1";
function applyPrivacyBtn(){
  document.getElementById("privacyBtn").textContent=privacyMode?"🙈":"👁️";
  document.getElementById("privacyBtn").title=privacyMode?"Mostrar importes":"Ocultar importes";
}
// ── CURRENCY TOGGLE ──
let currencyMode=localStorage.getItem("currencyMode")||"USD";
const EUR_RATE=()=>window._eurRate||0.92;
function applyCurrBtn(){
  const btn=document.getElementById("currBtn");
  if(btn){btn.textContent=currencyMode;btn.style.color=currencyMode==="EUR"?"var(--amber)":"var(--a1)";}
}
function toggleCurrency(){
  currencyMode=currencyMode==="USD"?"EUR":"USD";
  localStorage.setItem("currencyMode",currencyMode);
  applyCurrBtn();
  Object.values(charts).forEach(c=>c&&c.destroy());
  charts={};
  if(st.positions)renderMain(st.tab);
}
applyCurrBtn();

function togglePrivacy(){
  privacyMode=!privacyMode;
  localStorage.setItem("privacyMode",privacyMode?"1":"0");
  applyPrivacyBtn();
  Object.values(charts).forEach(c=>c&&c.destroy());
  charts={};
  if(st.positions)renderMain(st.tab);
}
applyPrivacyBtn();

// ── AUTH ──
function doLogin(){
  const p=document.getElementById("pwd").value;
  const e=document.getElementById("lerr");
  if(p!==PWD){e.textContent="Contraseña incorrecta.";return;}
  sessionStorage.setItem("auth","1");
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="block";
  renderTabs();loadData();
}
function doLogout(){sessionStorage.clear();location.reload();}
document.getElementById("pwd").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
if(sessionStorage.getItem("auth")==="1"){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="block";
  renderTabs();
}

// ── DATA LOADING ──
async function loadData(force){
  const btn=document.getElementById("btnr");
  btn.disabled=true;btn.textContent="⏳ Cargando…";
  document.getElementById("mc").innerHTML=`<div class="loading-state"><div class="spinner"></div><p style="color:var(--muted);font-size:13px">${force?"Forzando actualización desde IBKR (10-30s)…":"Cargando cartera…"}</p></div>`;
  try{
    const url="/.netlify/functions/portfolio"+(force?"?force=1":"");
    const r=await fetch(url);
    const data=await r.json();
    if(data.error){
      document.getElementById("mc").innerHTML=`<div class="error-box">⚠️ ${data.error}${data.raw?`<pre style="white-space:pre-wrap;margin-top:10px;font-size:10px;opacity:.7">${data.raw.replace(/</g,'&lt;')}</pre>`:""}</div>`;
      btn.disabled=false;btn.textContent="⟳ Actualizar";
      return;
    }
    if(data.debug){
      document.getElementById("mc").innerHTML=`<div class="error-box">⚠️ 0 posiciones encontradas.<pre style="white-space:pre-wrap;margin-top:10px;font-size:10px;opacity:.7">${data.debug.replace(/</g,'&lt;')}</pre></div>`;
      btn.disabled=false;btn.textContent="⟳ Actualizar";
      return;
    }
    st.positions=data.positions;
    st.dividends=data.dividends||[];
    st.optionPositions=data.optionPositions||[];
    st.optionsError=data.optionsError;
    st.navHistory=data.navHistory||[];
    if(data.usdToEur)window._eurRate=data.usdToEur;
    st.fetchedAt=data.fetchedAt;

    const fechaTxt=new Date(data.fetchedAt).toLocaleString("es-ES");
    if(data.stale){
      document.getElementById("upd").innerHTML=`⚠️ Datos antiguos (${fechaTxt}) — IBKR no disponible ahora mismo`;
    } else if(data.cached){
      document.getElementById("upd").innerHTML=`Caché · ${fechaTxt} <span style="opacity:.6">(hace ${data.cacheAgeMinutes||0} min · próxima auto. en ${Math.max(0,360-(data.cacheAgeMinutes||0))} min)</span>`;
    } else {
      document.getElementById("upd").innerHTML=`✓ Actualizado ahora · ${fechaTxt}`;
    }
  }catch(e){
    document.getElementById("mc").innerHTML=`<div class="error-box">⚠️ Error: ${e.message}</div>`;
  }
  btn.disabled=false;btn.textContent="⟳ Actualizar";
  renderMain(st.tab);
}

// ── FORMATTERS ──
const fmt=(n,d=0)=>n==null||isNaN(n)?"—":Number(n).toLocaleString("es-ES",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtD=(n)=>n==null||isNaN(n)?"—":`${n>=0?"+":""}${Number(n).toFixed(2)}%`;
function fmtC(n,forceCur){
  if(n==null||isNaN(n))return"—";
  if(privacyMode)return(forceCur||(currencyMode==="EUR"?"€":"$"))+"••••";
  const useEur=currencyMode==="EUR";
  const val=useEur?n*EUR_RATE():n;
  const sym=forceCur||(useEur?"€":"$");
  return sym+fmt(val,0);
}
const clr=(n)=>n>=0?"var(--green)":"var(--red)";
const cv=(n,cur="$")=>`<span style="color:${clr(n)}">${fmtC(n,cur)}</span>`;
const sc=(l,v,s,c)=>`<div class="stat-card"><div class="stat-label">${l}</div><div class="stat-value" style="color:${c}">${v}</div>${s?`<div class="stat-sub">${s}</div>`:""}</div>`;
function lg(t,sz=30){const d=LM[t];if(!d)return `<div class="pos-fb" style="width:${sz}px;height:${sz}px;font-size:${sz*.35}px">${t.slice(0,2)}</div>`;return `<img class="pos-logo" src="https://logo.clearbit.com/${d}" width="${sz}" height="${sz}" onerror="this.outerHTML='<div class=\\'pos-fb\\' style=\\'width:${sz}px;height:${sz}px;font-size:${sz*.35}px\\'>${t.slice(0,2)}</div>'" style="width:${sz}px;height:${sz}px"/>`;}

function chartColors(){
  const dark=document.documentElement.getAttribute("data-theme")!=="light";
  return {
    grid: dark?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)",
    tick: dark?"#64748b":"#475569",
    tooltipBg: dark?"#131d2e":"#ffffff",
    tooltipText: dark?"#e2e8f0":"#0f172a"
  };
}

const FX_TO_USD={USD:1,EUR:1.08,HKD:0.128,GBP:1.27};

function enrich(positions,dividends){
  const stocks=(positions||[]).filter(p=>p.assetCategory==="STK"||p.assetCategory==="FUND");
  const tot=stocks.reduce((a,p)=>{
    const fx=FX_TO_USD[p.currency]||parseFloat(p.fxRateToBase)||1;
    return a+(parseFloat(p.positionValue)||0)*fx;
  },0);

  // Real dividends received per symbol over last 12 months -> annualized
  const now=new Date();
  const oneYearAgo=new Date(now.getTime()-365*24*3600*1000);
  const divBySymbol={};
  (dividends||[]).forEach(d=>{
    const sym=d.symbol;
    if(!sym)return;
    const dateStr=(d.dateTime||"").split(";")[0];
    const date=new Date(dateStr.replace(/(\d{4})(\d{2})(\d{2})/,"$1-$2-$3"));
    const fx=FX_TO_USD[d.currency]||parseFloat(d.fxRateToBase)||1;
    const amt=(parseFloat(d.amount)||0)*fx;
    if(!divBySymbol[sym])divBySymbol[sym]={total12m:0,count:0,all:[]};
    divBySymbol[sym].all.push({date,amt,raw:d});
    if(date>=oneYearAgo){
      divBySymbol[sym].total12m+=amt;
      divBySymbol[sym].count++;
    }
  });

  return stocks.map(p=>{
    const fx=FX_TO_USD[p.currency]||parseFloat(p.fxRateToBase)||1;
    const qty=parseFloat(p.position)||0;
    const markPrice=parseFloat(p.markPrice)||0;
    const posVal=(parseFloat(p.positionValue)||0)*fx;
    const costBasisMoney=(parseFloat(p.costBasisMoney)||0)*fx;
    const costBasisPrice=parseFloat(p.costBasisPrice)||0;
    const unrealPnl=(parseFloat(p.fifoPnlUnrealized)||0)*fx;
    const pct=costBasisMoney!==0?((posVal-costBasisMoney)/Math.abs(costBasisMoney))*100:0;
    const w=tot>0?(posVal/tot)*100:0;

    const realDiv=divBySymbol[p.symbol];
    let annDiv,divSource;
    if(realDiv && realDiv.total12m>0){
      annDiv=realDiv.total12m;
      divSource="real";
    } else {
      const fallback=DIV_FALLBACK[p.symbol]||0;
      annDiv=fallback*qty*fx;
      divSource="estimado";
    }
    const yoc=costBasisPrice>0 && qty>0?((annDiv/qty)/costBasisPrice)*100:0;
    const curYield=markPrice>0 && qty>0?((annDiv/qty)/markPrice)*100:0;

    return{
      ...p,ticker:p.symbol,usd:posVal,pct,w,
      qty,markPrice,costBasisPrice,costBasisMoney,unrealPnl,
      annDiv,yoc,curYield,divSource,
      nativeVal:parseFloat(p.positionValue)||0,
      nativeCost:parseFloat(p.costBasisMoney)||0,
      nativePnl:parseFloat(p.fifoPnlUnrealized)||0
    };
  }).sort((a,b)=>b.usd-a.usd);
}

function monthlyDividendSeries(dividends){
  // Build last-12-months series in USD
  const now=new Date();
  const months=[];
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push({key:`${d.getFullYear()}-${d.getMonth()}`,label:MESES[d.getMonth()]+" "+String(d.getFullYear()).slice(2),total:0});
  }
  const map={};
  months.forEach(m=>map[m.key]=m);
  (dividends||[]).forEach(d=>{
    const dateStr=(d.dateTime||"").split(";")[0];
    if(dateStr.length<8)return;
    const y=+dateStr.slice(0,4),mo=+dateStr.slice(4,6)-1;
    const key=`${y}-${mo}`;
    if(map[key]){
      const fx=FX_TO_USD[d.currency]||parseFloat(d.fxRateToBase)||1;
      map[key].total+=(parseFloat(d.amount)||0)*fx;
    }
  });
  return months;
}

function yearlyDividendSeries(dividends){
  const byYear={};
  (dividends||[]).forEach(d=>{
    const dateStr=(d.dateTime||"").split(";")[0];
    if(dateStr.length<4)return;
    const y=dateStr.slice(0,4);
    const fx=FX_TO_USD[d.currency]||parseFloat(d.fxRateToBase)||1;
    byYear[y]=(byYear[y]||0)+(parseFloat(d.amount)||0)*fx;
  });
  return Object.entries(byYear).sort((a,b)=>a[0].localeCompare(b[0]));
}

      ${sc("Rendimiento Total","<span style='color:"+clr(totalRet)+"'>"+fmtD(totalRet)+"</span>","Desde "+nav[0].date.replace(/(\d{4})(\d{2})(\d{2})/,"$3/$2/$1"),"var(--a1)")}
      ${sc("YTD","<span style='color:"+clr(ytdRet)+"'>"+fmtD(ytdRet)+"</span>",""+new Date().getFullYear(),"var(--amber)")}
      ${sc("NAV Actual",fmtC(current,"€"),"Valor cuenta en EUR","var(--green)")}
      ${sc("NAV Inicio",fmtC(base,"€"),"Inicio del período","var(--muted)")}
    </div>
    <div class="card">
      <div class="card-title">Curva de rendimiento (% desde inicio del período)</div>
      <div class="chart-wrap tall"><canvas id="chartNAV"></canvas></div>
    </div>`;
    setTimeout(()=>{
      charts.nav=new Chart(document.getElementById("chartNAV"),{
        type:"line",
        data:{labels,datasets:[{
          label:"Rendimiento %",data:dataPoints,
          borderColor:"#10b981",backgroundColor:"rgba(16,185,129,.1)",
          borderWidth:2,pointRadius:0,pointHoverRadius:4,fill:true,tension:.3
        }]},
        options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
          plugins:{legend:{display:false},tooltip:{backgroundColor:cc.tooltipBg,titleColor:cc.tooltipText,bodyColor:cc.tooltipText,
            callbacks:{label:c=>c.parsed.y.toFixed(2)+"%",title:t=>t[0].label}}},
          scales:{
            x:{grid:{display:false},ticks:{color:cc.tick,maxTicksLimit:12,maxRotation:0}},
            y:{grid:{color:cc.grid},ticks:{color:cc.tick,callback:v=>v+"%"},
               afterDataLimits:a=>{a.min=Math.min(...dataPoints)-2;a.max=Math.max(...dataPoints)+2;}}
          }}
      });
    },0);
  }

  else if(tab==="sectores"){
    const sectors={};
    en.forEach(p=>{
      const sec=SECTOR_MAP[p.ticker]||"Otros";
      if(!sectors[sec])sectors[sec]={val:0,tickers:[]};
      sectors[sec].val+=p.usd;
      sectors[sec].tickers.push(p);
    });
    const secArr=Object.entries(sectors).sort((a,b)=>b[1].val-a[1].val);
    const cc=chartColors();
    el.innerHTML=`
    <div class="two-col" style="margin-bottom:14px">
      <div class="card">
        <div class="card-title">Distribución por sector</div>
        <div class="chart-wrap"><canvas id="chartSector"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Peso por sector</div>
        ${secArr.map(([sec,d],i)=>`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <div style="width:10px;height:10px;border-radius:50%;background:${CL[i%CL.length]};flex-shrink:0"></div>
            <span style="font-size:12px;flex:1">${sec}</span>
            <div class="pb"><div style="height:100%;border-radius:4px;width:${(d.val/tot)*100}%;background:${CL[i%CL.length]}"></div></div>
            <span style="font-size:11px;color:var(--muted);font-family:var(--mono);width:40px;text-align:right">${fmt((d.val/tot)*100,1)}%</span>
          </div>`).join("")}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Posiciones por sector</div>
      ${secArr.map(([sec,d],i)=>`
        <div style="margin-bottom:14px">
          <div style="font-size:10px;color:${CL[i%CL.length]};font-family:var(--mono);text-transform:uppercase;margin-bottom:6px;font-weight:700">${sec} · ${fmt((d.val/tot)*100,1)}%</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${d.tickers.map(p=>`<div style="background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:6px">
              ${lg(p.ticker,18)}
              <span style="font-size:11px;font-family:var(--mono);font-weight:700">${p.ticker}</span>
              <span style="font-size:10px;color:${clr(p.pct)}">${fmtD(p.pct)}</span>
            </div>`).join("")}
          </div>
        </div>`).join("")}
    </div>`;
    setTimeout(()=>{
      charts.sector=new Chart(document.getElementById("chartSector"),{
        type:"doughnut",
        data:{labels:secArr.map(s=>s[0]),datasets:[{data:secArr.map(s=>+s[1].val.toFixed(0)),
          backgroundColor:CL.slice(0,secArr.length),borderWidth:2,borderColor:"var(--bg)"}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:"60%",
          plugins:{legend:{display:false},tooltip:{backgroundColor:cc.tooltipBg,titleColor:cc.tooltipText,bodyColor:cc.tooltipText,
            callbacks:{label:c=>`${c.label}: ${((c.parsed/secArr.reduce((a,s)=>a+s[1].val,0))*100).toFixed(1)}%`}}}}
      });
    },0);
  }

  else if(tab==="calendario"){
    const divs=st.dividends||[];
    if(divs.length===0){
      el.innerHTML=`<div class="warn-box">Sin datos de dividendos reales. Actualiza los datos desde IBKR.</div>`;
      return;
    }
    // Group by month
    const byMonth={};
    divs.forEach(d=>{
      const ds=(d.dateTime||"").split(";")[0];
      if(ds.length<8)return;
      const y=ds.slice(0,4),m=ds.slice(4,6);
      const key=y+"-"+m;
      if(!byMonth[key])byMonth[key]={label:MESES[+m-1]+" "+y,items:[]};
      const fx=FX_TO_USD[d.currency]||1;
      byMonth[key].items.push({sym:d.symbol,amt:(parseFloat(d.amount)||0)*fx,cur:d.currency,date:ds});
    });
    const months=Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0]));
    el.innerHTML=`
    <div class="stats-grid" style="margin-bottom:16px">
      ${sc("Total transacciones",divs.length,"Dividendos recibidos","var(--a1)")}
      ${sc("Empresas pagadoras",[...new Set(divs.map(d=>d.symbol))].length,"","#a78bfa")}
    </div>
    ${months.map(([key,m])=>`
      <div class="card">
        <div class="card-title">${m.label} · ${fmtC(m.items.reduce((s,i)=>s+i.amt,0))}</div>
        ${m.items.sort((a,b)=>b.amt-a.amt).map(item=>`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            ${lg(item.sym,22)}
            <span style="font-size:12px;font-weight:700;font-family:var(--mono);flex:1">${item.sym}</span>
            <span style="font-size:11px;color:var(--muted)">${item.date.replace(/(\d{4})(\d{2})(\d{2})/,"$3/$2/$1")}</span>
            <span style="font-size:12px;font-weight:700;font-family:var(--mono);color:#a78bfa">${fmtC(item.amt)}</span>
          </div>`).join("")}
      </div>`).join("")}`;
  }
}

function rankRow(label,p,value,color){
  if(!p)return"";
  return `<div class="rank-row">
    <div style="display:flex;align-items:center;gap:10px">
      ${lg(p.ticker,24)}
      <div>
        <div class="rank-label">${label}</div>
        <div style="font-size:12px;font-weight:700;font-family:var(--mono)">${p.ticker}</div>
      </div>
    </div>
    <span class="rank-value" style="color:${color}">${value}</span>
  </div>`;
}
</script>
</body>
</html>
